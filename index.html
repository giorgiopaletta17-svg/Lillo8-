<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Ultimate Player</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background-color: #0a0a0a; color: #FFD700; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 850px; margin: auto; background: #151515; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input, select { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #FFD700; background: #000; color: #fff; outline: none; }
        .btn { background: #FFD700; color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        .video-js { width: 100% !important; height: 400px !important; border-radius: 10px; margin-top: 15px; }
        #searchBar { border-color: #00AEEF; } /* Colore diverso per la ricerca */
    </style>
</head>
<body onload="checkSavedLink()">
<div class="container">
    <h1>[NOME TUA TV] PLAYER</h1>
    <input type="text" id="m3uUrl" placeholder="Incolla qui il link .m3u">
    <div class="btn-group">
        <button class="btn" onclick="saveAndParse()">SALVA E CARICA</button>
        <button class="btn" style="background:#cc0000; color:#fff;" onclick="clearStorage()">CANCELLA</button>
    </div>
    <hr style="border: 0.5px solid #333; margin: 20px 0;">
    <input type="text" id="searchBar" placeholder="🔍 Cerca canale..." onkeyup="filterChannels()">
    <select id="channelList" size="5" onchange="playChannel()">
        <option>Nessuna lista...</option>
    </select>
    <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'>
        <source src="" type="application/x-mpegURL">
    </video>
    <div id="statusMsg" style="font-size:12px; color:#888; margin-top:10px;">Pronto.</div>
</div>
<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    let allChannels = [];
    function checkSavedLink() {
        const savedLink = localStorage.getItem('iptv_link');
        if (savedLink) { document.getElementById('m3uUrl').value = savedLink; parseM3U(savedLink); }
    }
    async function saveAndParse() {
        const url = document.getElementById('m3uUrl').value;
        if (!url) return alert("Inserisci un link!");
        localStorage.setItem('iptv_link', url);
        parseM3U(url);
    }
    async function parseM3U(url) {
        try {
            const response = await fetch(url);
            const data = await response.text();
            const lines = data.split('\n');
            allChannels = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].substring(lines[i].lastIndexOf(',') + 1).trim();
                    const link = lines[i + 1]?.trim();
                    if(link && link.startsWith('http')) allChannels.push({ name, link });
                }
            }
            displayChannels(allChannels);
            document.getElementById('statusMsg').innerText = "Trovati " + allChannels.length + " canali.";
        } catch (e) { alert("Errore link!"); }
    }
    function displayChannels(list) {
        const select = document.getElementById('channelList');
        select.innerHTML = '';
        list.forEach((ch, index) => {
            let opt = document.createElement('option');
            opt.value = ch.link;
            opt.text = ch.name;
            select.appendChild(opt);
        });
    }
    function filterChannels() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const filtered = allChannels.filter(ch => ch.name.toLowerCase().includes(term));
        displayChannels(filtered);
    }
    function playChannel() {
        const url = document.getElementById('channelList').value;
        const player = videojs('my-video');
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play();
    }
    function clearStorage() { localStorage.removeItem('iptv_link'); location.reload(); }
</script>
</body>
</html>
